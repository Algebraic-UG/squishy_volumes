name: Bundle Extension

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  build-linux:
    uses: ./.github/workflows/build-wheel.yml
    with:
      runs-on: '["ubuntu-latest"]'
      target-triple: 'x86_64-unknown-linux-gnu'
      artifact-name: 'wheel-linux'

  build-windows:
    uses: ./.github/workflows/build-wheel.yml
    with:
      runs-on: '["windows-latest"]'
      target-triple: 'x86_64-pc-windows-msvc'
      artifact-name: 'wheel-windows'

  build-macos:
    uses: ./.github/workflows/build-wheel.yml
    with:
      runs-on: '["macos-latest"]'
      target-triple: 'aarch64-apple-darwin'
      artifact-name: 'wheel-macos'

  bundle-extension:
    runs-on: [ubuntu-latest]
    needs: [build-linux, build-windows, build-macos]
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.3.2

      - name: Vendorize Tree Clipper
        working-directory: python
        run: uv run python-vendorize

      # =================================================================
      # Download all wheel artifacts
      # =================================================================
      - uses: actions/download-artifact@v8
        with:
          name: wheel-linux
          path: python/src/squishy_volumes_extension/wheels/

      - uses: actions/download-artifact@v8
        with:
          name: wheel-windows
          path: python/src/squishy_volumes_extension/wheels/

      - uses: actions/download-artifact@v8
        with:
          name: wheel-macos
          path: python/src/squishy_volumes_extension/wheels/

      # =================================================================
      # Final preparations
      # =================================================================
      - name: Update manifest
        run: uv run --python 3.11 --with toml scripts/update_manifest.py

      - name: Copy license
        run: cp LICENSE_GPLv3 python/src/squishy_volumes_extension

      - name: Get build script
        run: curl https://raw.githubusercontent.com/blender/blender/refs/tags/v5.0.1/scripts/addons_core/bl_pkg/cli/blender_ext.py --output blender_ext.py

      # =================================================================
      # Bundle and upload
      # =================================================================
      - name: Build Blender extension bundles
        working-directory: python/src/squishy_volumes_extension
        run: uv run --python 3.13 ../../../blender_ext.py build --split-platforms

      - name: Generate index.json for easy updates
        working-directory: python/src/squishy_volumes_extension
        run: uv run --python 3.13 ../../../blender_ext.py server-generate --repo-dir=./

      - uses: actions/upload-artifact@v7
        with:
          name: squishy-volumes-extension
          path: |
            python/src/squishy_volumes_extension/index.json
            python/src/squishy_volumes_extension/*.zip
